name: Website CI

# Reusable workflow for Vempain websites that combine a PHP Slim backend
# with a TypeScript/React frontend, each built into a separate Docker image.
#
# Callers: vempain-website

on:
  workflow_call:
    inputs:
      php_version:
        description: 'PHP version (shivammathur/setup-php)'
        type: string
        default: '8.5'
      php_extensions:
        description: 'Comma-separated PHP extensions to install'
        type: string
        default: 'bcmath, mbstring, pdo_pgsql'
      node_version:
        description: 'Node.js version for the frontend'
        type: string
        default: '24'
      backend_image:
        description: 'Full GHCR image name for the backend (e.g. ghcr.io/vempain/vempain-site-backend)'
        type: string
        required: true
      frontend_image:
        description: 'Full GHCR image name for the frontend (e.g. ghcr.io/vempain/vempain-site-frontend)'
        type: string
        required: true
      backend_dockerfile:
        description: 'Path to the backend Dockerfile relative to the repo root'
        type: string
        default: 'backend/Dockerfile'
      backend_context:
        description: 'Docker build context for the backend'
        type: string
        default: 'backend'
      frontend_dockerfile:
        description: 'Path to the frontend Dockerfile relative to the repo root'
        type: string
        default: 'frontend/Dockerfile'
      frontend_context:
        description: 'Docker build context for the frontend'
        type: string
        default: 'frontend'
    secrets:
      VEMPAIN_ACTION_TOKEN:
        description: 'Organisation token with packages:write used for GitHub API calls'
        required: false

env:
  REGISTRY: ghcr.io

concurrency: build

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: PHP backend – lint & format check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP ${{ inputs.php_version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          extensions: ${{ inputs.php_extensions }}

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-progress --prefer-dist
        env:
          COMPOSER_MEMORY_LIMIT: 2G

      - name: Run backend formatting fix
        working-directory: backend
        run: ./vendor/bin/phpcbf

      - name: Run backend lint
        working-directory: backend
        run: composer lint

  # ──────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: TypeScript frontend – lint & test
    runs-on: ubuntu-latest
    needs: backend-tests
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Resolve package token
        shell: bash
        run: |
          if [ -n "${{ secrets.VEMPAIN_ACTION_TOKEN }}" ]; then
            echo "Using VEMPAIN_ACTION_TOKEN for package registry authentication"
            VEMPAIN_ACTION_TOKEN="${{ secrets.VEMPAIN_ACTION_TOKEN }}"
          else
            echo "VEMPAIN_ACTION_TOKEN not set, falling back to GITHUB_TOKEN"
            VEMPAIN_ACTION_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          echo "VEMPAIN_ACTION_TOKEN=${VEMPAIN_ACTION_TOKEN}" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      - name: Run frontend lint
        working-directory: frontend
        run: yarn lint
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      - name: Run frontend tests
        working-directory: frontend
        run: yarn test --passWithNoTests --watchAll=false
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      - name: Run frontend coverage
        working-directory: frontend
        run: yarn test:coverage --passWithNoTests
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  release-and-publish:
    name: Version, build and push Docker images
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-tests ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    env:
      VEMPAIN_ACTION_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Resolve package token
        shell: bash
        run: |
          if [ -n "${{ secrets.VEMPAIN_ACTION_TOKEN }}" ]; then
            echo "Using VEMPAIN_ACTION_TOKEN for package registry authentication"
            VEMPAIN_ACTION_TOKEN="${{ secrets.VEMPAIN_ACTION_TOKEN }}"
          else
            echo "VEMPAIN_ACTION_TOKEN not set, falling back to GITHUB_TOKEN"
            VEMPAIN_ACTION_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          echo "VEMPAIN_ACTION_TOKEN=${VEMPAIN_ACTION_TOKEN}" >> $GITHUB_ENV

      - name: Get main and base version
        id: basemain
        shell: bash
        run: |
          baseVersion=$(cat VERSION)
          mainVersion=$(echo ${baseVersion} | cut -d '.' -f 1)
          echo "baseVersion=${baseVersion}" >> $GITHUB_OUTPUT
          echo "mainVersion=${mainVersion}" >> $GITHUB_OUTPUT

      - name: Generate new version
        id: newVer
        shell: bash
        run: |
          git fetch --tags origin
          currentVersion=$(git tag --list --sort=-version:refname "${baseVersion}.*" | head -n 1 || echo "${baseVersion}.0")

          if [ -z "${currentVersion}" ]; then
            newVersion="${baseVersion}.0"
          else
            runningNumber=$(echo ${currentVersion} | cut -f 3 -d '.')
            newVersion="${baseVersion}.$((${runningNumber} + 1))"
          fi
          echo "The generated new version is: ${newVersion}"
          echo "newVersion=${newVersion}" >> $GITHUB_OUTPUT
        env:
          baseVersion: ${{ steps.basemain.outputs.baseVersion }}

      - name: Copy VERSION into frontend
        shell: bash
        run: |
          if [ -f VERSION ]; then
            cp VERSION frontend/VERSION
            echo "Copied VERSION into frontend/VERSION"
          else
            echo "ERROR: VERSION file not found in repo root" >&2
            exit 1
          fi

      - name: Set new package version in frontend
        working-directory: frontend
        run: |
          echo "Setting version: ${newVersion}"
          yarn version --immediate ${newVersion}
        env:
          newVersion: ${{ steps.newVer.outputs.newVersion }}
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      - name: Build frontend production package
        working-directory: frontend
        run: |
          yarn install
          yarn build:production
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        shell: bash
        run: |
          backendImage="${{ inputs.backend_image }}"
          docker build --progress=plain -f ${{ inputs.backend_dockerfile }} -t ${backendImage}:latest ${{ inputs.backend_context }}
          echo "Tagging backend image: ${mainVersion}, ${baseVersion}, ${newVersion}"
          docker tag ${backendImage}:latest ${backendImage}:${mainVersion}
          docker tag ${backendImage}:latest ${backendImage}:${baseVersion}
          docker tag ${backendImage}:latest ${backendImage}:${newVersion}
          docker push --all-tags ${backendImage}
        env:
          mainVersion: ${{ steps.basemain.outputs.mainVersion }}
          baseVersion: ${{ steps.basemain.outputs.baseVersion }}
          newVersion: ${{ steps.newVer.outputs.newVersion }}

      - name: Build and push frontend Docker image
        shell: bash
        run: |
          frontendImage="${{ inputs.frontend_image }}"
          docker build --progress=plain -f ${{ inputs.frontend_dockerfile }} -t ${frontendImage}:latest ${{ inputs.frontend_context }}
          echo "Tagging frontend image: ${mainVersion}, ${baseVersion}, ${newVersion}"
          docker tag ${frontendImage}:latest ${frontendImage}:${mainVersion}
          docker tag ${frontendImage}:latest ${frontendImage}:${baseVersion}
          docker tag ${frontendImage}:latest ${frontendImage}:${newVersion}
          docker push --all-tags ${frontendImage}
        env:
          mainVersion: ${{ steps.basemain.outputs.mainVersion }}
          baseVersion: ${{ steps.basemain.outputs.baseVersion }}
          newVersion: ${{ steps.newVer.outputs.newVersion }}

      - name: Create git tag
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.newVer.outputs.newVersion }}',
              sha: context.sha
            })

      - name: Create GitHub Release
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.newVer.outputs.newVersion }}';
            const resp = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: [
                `Automated release for ${tag}`,
                '',
                'Docker tags pushed:',
                '- latest',
                `- ${{ steps.basemain.outputs.mainVersion }}`,
                `- ${{ steps.basemain.outputs.baseVersion }}`,
                `- ${tag}`
              ].join('\n'),
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            core.info(`Release created: ${resp.data.html_url}`);

