name: Frontend SPA CI

# Reusable workflow for Vempain TypeScript/JS single-page-application
# repositories that build a Docker image.
#
# Callers: vempain-admin-frontend, vempain-file-frontend, vempain-site
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ Key inputs                                                              │
# │  use_scoped_registry  – add @vempain scope pointing at npm.pkg.github  │
# │  use_immutable_install – pass --immutable to yarn install               │
# │  use_corepack         – run `corepack enable` before Node setup         │
# │  build_command        – yarn script for the production build            │
# │  run_coverage         – run yarn test:coverage after tests              │
# │  commit_version_bump  – commit package.json version back to the branch  │
# │  push_all_version_tags – push latest/major/minor/patch (true) or only  │
# │                          the patch-level version tag (false)            │
# │  version_tag_prefix   – prefix for git tags, e.g. '' or 'v'            │
# └─────────────────────────────────────────────────────────────────────────┘

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        type: string
        default: '24'
      use_scoped_registry:
        description: 'Configure npm registry for @vempain scope'
        type: boolean
        default: false
      use_immutable_install:
        description: 'Pass --immutable to yarn install'
        type: boolean
        default: false
      use_corepack:
        description: 'Run corepack enable before Node setup'
        type: boolean
        default: false
      build_command:
        description: 'Yarn script for the production build (e.g. build:production or build)'
        type: string
        default: 'build:production'
      test_extra_flags:
        description: 'Flags appended to `yarn test`'
        type: string
        default: '--passWithNoTests --watchAll=false'
      run_coverage:
        description: 'Run `yarn test:coverage` as a separate step'
        type: boolean
        default: true
      commit_version_bump:
        description: 'Commit the package.json version bump back to the branch'
        type: boolean
        default: false
      push_all_version_tags:
        description: 'Push latest/major/minor/patch tags (true) or only the patch version tag (false)'
        type: boolean
        default: true
      version_tag_prefix:
        description: "Prefix for git version tags (empty string or 'v')"
        type: string
        default: ''
    secrets:
      VEMPAIN_ACTION_TOKEN:
        description: 'Organisation token used for private @vempain packages and GitHub API calls'
        required: false

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: vempain
  IMAGE_NAME: ${{ github.repository }}

concurrency: build

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run all tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PACKAGE_AUTH_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
      VEMPAIN_ACTION_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Enable Corepack
        if: inputs.use_corepack
        run: corepack enable

      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'yarn'
          registry-url: ${{ inputs.use_scoped_registry && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.use_scoped_registry && '@vempain' || '' }}

      - name: Install dependencies
        run: yarn install ${{ inputs.use_immutable_install && '--immutable' || '' }}
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
          YARN_ENABLE_HARDENED_MODE: false

      - name: Build
        run: yarn build
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}

      - name: Run tests
        run: yarn test ${{ inputs.test_extra_flags }}
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}

      - name: Run coverage
        if: inputs.run_coverage
        run: yarn test:coverage
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  version-and-upload:
    name: Version, build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    # Skip the build-bot's own commit to avoid infinite loops when commit_version_bump is true
    if: >
      github.ref == 'refs/heads/main' &&
      (inputs.commit_version_bump == false || github.actor != 'github-actions[bot]')
    permissions:
      contents: write
      packages: write
    env:
      PACKAGE_AUTH_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
      VEMPAIN_ACTION_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Enable Corepack
        if: inputs.use_corepack
        run: corepack enable

      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'yarn'
          registry-url: ${{ inputs.use_scoped_registry && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.use_scoped_registry && '@vempain' || '' }}


      - name: Get main and base version
        id: basemain
        shell: bash
        run: |
          baseVersion=$(cat VERSION)
          mainVersion=$(echo ${baseVersion} | cut -d '.' -f 1)
          echo "baseVersion=${baseVersion}" >> $GITHUB_OUTPUT
          echo "mainVersion=${mainVersion}" >> $GITHUB_OUTPUT

      - name: Generate new version
        id: newVer
        shell: bash
        run: |
          git fetch --tags origin
          prefix="${{ inputs.version_tag_prefix }}"
          currentVersion=$(git tag --list --sort=-version:refname "${prefix}${baseVersion}.*" | head -n 1)

          if [ -z "${currentVersion}" ]; then
            newVersion="${baseVersion}.0"
          else
            # Strip any prefix before parsing
            bare=$(echo "${currentVersion}" | sed "s/^${prefix}//")
            runningNumber=$(echo ${bare} | cut -f 3 -d '.')
            newVersion="${baseVersion}.$((${runningNumber} + 1))"
          fi
          echo "The generated new version is: ${newVersion}"
          echo "newVersion=${newVersion}" >> $GITHUB_OUTPUT
        env:
          baseVersion: ${{ steps.basemain.outputs.baseVersion }}

      - name: Set new package version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          echo "Setting version: ${newVersion}"
          yarn version --immediate ${newVersion}
        env:
          newVersion: ${{ steps.newVer.outputs.newVersion }}
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}

      - name: Commit and push version bump
        if: inputs.commit_version_bump && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          newVersion="${{ steps.newVer.outputs.newVersion }}"
          prefix="${{ inputs.version_tag_prefix }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json
          [ -f yarn.lock ] && git add yarn.lock

          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(release): ${prefix}${newVersion} [skip ci]"
            git tag "${prefix}${newVersion}"
            git push --atomic origin HEAD "refs/tags/${prefix}${newVersion}"
          fi

      - name: Build production package
        run: |
          yarn install ${{ inputs.use_immutable_install && '--immutable' || '' }}
          yarn ${{ inputs.build_command }}
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
          YARN_ENABLE_HARDENED_MODE: false

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (all version tags)
        if: inputs.push_all_version_tags
        shell: bash
        run: |
          imgName="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          docker build . --tag ${imgName}:latest
          echo "Setting versions to: '${mainVersion}', '${baseVersion}', '${newVersion}'"
          docker image tag ${imgName}:latest ${imgName}:${mainVersion}
          docker image tag ${imgName}:latest ${imgName}:${baseVersion}
          docker image tag ${imgName}:latest ${imgName}:${newVersion}
          docker push --all-tags ${imgName}
        env:
          mainVersion: ${{ steps.basemain.outputs.mainVersion }}
          baseVersion: ${{ steps.basemain.outputs.baseVersion }}
          newVersion: ${{ steps.newVer.outputs.newVersion }}

      - name: Build and push Docker image (version tag only)
        if: '!inputs.push_all_version_tags'
        shell: bash
        run: |
          imgName="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          docker build . --tag ${imgName}:${{ steps.newVer.outputs.newVersion }}
          docker push ${imgName}:${{ steps.newVer.outputs.newVersion }}

      - name: Create git tag
        if: '!inputs.commit_version_bump && github.event_name == ''push'' && (github.ref == ''refs/heads/main'' || startsWith(github.ref, ''refs/tags/''))'
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ inputs.version_tag_prefix }}${{ steps.newVer.outputs.newVersion }}',
              sha: context.sha
            })

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const tag = '${{ inputs.version_tag_prefix }}${{ steps.newVer.outputs.newVersion }}';
            const resp = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: [
                `Automated release for ${tag}`,
                '',
                'Docker tags pushed:',
                ${{ inputs.push_all_version_tags }} ? '- latest' : '',
                ${{ inputs.push_all_version_tags }} ? `- ${{ steps.basemain.outputs.mainVersion }}` : '',
                ${{ inputs.push_all_version_tags }} ? `- ${{ steps.basemain.outputs.baseVersion }}` : '',
                `- ${tag}`
              ].filter(Boolean).join('\n'),
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            core.info(`Release created: ${resp.data.html_url}`);

