name: Frontend Library CI

# Reusable workflow for Vempain TypeScript/JS libraries that are published
# to GitHub Packages (npm) but do NOT produce a Docker image.
#
# Callers: vempain-auth-frontend

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        type: string
        default: '22'
    secrets:
      VEMPAIN_ACTION_TOKEN:
        description: 'Organisation token with packages:write used for npm publish'
        required: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run all tests
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'

      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: |
          yarn cache clean
          yarn install

      - name: Run tests
        run: yarn test

      - name: Run coverage
        run: yarn test:coverage

  # ──────────────────────────────────────────────────────────────────────────
  publish:
    name: Package and publish to GitHub NPM
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'

      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: |
          yarn cache clean
          yarn install

      - name: Build
        run: yarn build:production

      - name: Generate versions
        id: version
        uses: Vempain/vempain-workflows/.github/actions/generate-version@main

      - name: Set new package version
        run: |
          echo "Setting version: ${newVersion}"
          yarn version --immediate ${newVersion}
        env:
          newVersion: ${{ steps.version.outputs.new_version }}

      - name: Publish to GitHub Packages (npm)
        run: |
          echo "registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.VEMPAIN_ACTION_TOKEN }}" >> .npmrc
          echo "@vempain:registry=https://npm.pkg.github.com" >> .npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN }}

      - name: Create tag
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.version.outputs.new_version }}',
              sha: context.sha
            })

      - name: Create GitHub Release
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const tag = '${{ steps.version.outputs.new_version }}';
            const packageUrl = `https://github.com/orgs/${context.repo.owner}/packages?repo_name=${context.repo.repo}&ecosystem=npm`;
            const resp = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: [
                `Automated release for ${tag}`,
                '',
                'Build artifacts:',
                `- npm package list: ${packageUrl}`,
                '',
                'NPM package versions published:',
                '- latest',
                `- ${{ steps.version.outputs.main_version }}`,
                `- ${{ steps.version.outputs.base_version }}`,
                `- ${tag}`
              ].join('\n'),
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            core.info(`Release created: ${resp.data.html_url}`);

