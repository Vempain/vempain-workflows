name: RPM CLI Package

on:
  workflow_call:
    inputs:
      java_version:
        description: 'Temurin JDK version used to build the CLI fat jar'
        type: string
        default: '25'
      version_file:
        description: 'Path to VERSION file used for RPM package version'
        type: string
        default: 'VERSION'
      gradle_task:
        description: 'Gradle task that builds the runnable CLI fat jar'
        type: string
        default: ':cli:fatJar'
      jar_path:
        description: 'Path to the built fat jar produced by gradle_task'
        type: string
        default: 'cli/build/libs/vf-cli.jar'
      spec_file:
        description: 'Path to RPM spec file in the repository'
        type: string
        default: 'packaging/rpm/vempain-file-cli.spec'
      source_jar_path:
        description: 'Path where the prebuilt jar is copied for rpmbuild sources'
        type: string
        default: 'packaging/rpm/vf-cli.jar'
      wrapper_script_path:
        description: 'Path to wrapper script included into RPM'
        type: string
        default: 'vf-cli'
      jre_package:
        description: 'RPM package name required as runtime dependency'
        type: string
        default: 'java-21-openjdk-headless'
      artifact_name:
        description: 'Name for uploaded RPM artifact'
        type: string
        default: 'vempain-file-cli-rpm'
      test_task:
        description: 'Gradle task executed on non-main pushes (tests-only flow)'
        type: string
        default: 'clean test'
      attach_to_release:
        description: 'When true, try to upload RPMs to a GitHub Release and append links to release notes'
        type: boolean
        default: true
    secrets:
      VEMPAIN_ACTION_TOKEN:
        description: 'Optional token for private package resolution during Gradle build'
        required: false

jobs:
  test:
    name: Run tests (non-main pushes)
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || github.token }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Java temurin ${{ inputs.java_version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests with Gradle
        run: ./gradlew ${{ inputs.test_task }}

  build-rpm:
    name: Build CLI RPM package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.VEMPAIN_ACTION_TOKEN != '' && secrets.VEMPAIN_ACTION_TOKEN || github.token }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java temurin ${{ inputs.java_version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build CLI fat jar
        run: ./gradlew ${{ inputs.gradle_task }}

      - name: Generate versions
        id: version
        uses: Vempain/vempain-workflows/.github/actions/generate-version@main
        with:
          version_file: ${{ inputs.version_file }}

      - name: Prepare RPM build sources
        shell: bash
        run: |
          set -euo pipefail

          rpmVersion="${{ steps.version.outputs.new_version }}"

          mkdir -p "$(dirname "${{ inputs.source_jar_path }}")"
          cp "${{ inputs.jar_path }}" "${{ inputs.source_jar_path }}"
          chmod 0755 "${{ inputs.wrapper_script_path }}"

          sed -i "s/^Version:.*/Version:        ${rpmVersion}/" "${{ inputs.spec_file }}"
          sed -i "s/^Requires:.*/Requires:       ${{ inputs.jre_package }}/" "${{ inputs.spec_file }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "${{ inputs.spec_file }}" "${{ inputs.source_jar_path }}" "${{ inputs.wrapper_script_path }}"

          if git diff --cached --quiet; then
            echo "No staged RPM source changes detected."
          else
            git commit -m "ci(rpm): prepare sources [skip ci]"
          fi

      - name: Build RPM package
        id: rpmbuild
        uses: naveenrajm7/rpmbuild@master
        with:
          spec_file: ${{ inputs.spec_file }}

      - name: Discover generated RPM files
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          binaryRpm="$(find "${{ steps.rpmbuild.outputs.rpm_dir_path }}" -maxdepth 2 -type f -name '*.rpm' ! -name '*.src.rpm' | head -n 1)"
          sourceRpm="$(find "${{ steps.rpmbuild.outputs.source_rpm_dir_path }}" -maxdepth 2 -type f -name '*.src.rpm' | head -n 1)"

          if [[ -z "${binaryRpm}" || -z "${sourceRpm}" ]]; then
            echo "Failed to locate generated RPM files." >&2
            exit 1
          fi

          echo "binary_rpm_path=${binaryRpm}" >> "$GITHUB_OUTPUT"
          echo "source_rpm_path=${sourceRpm}" >> "$GITHUB_OUTPUT"
          echo "binary_rpm_name=$(basename "${binaryRpm}")" >> "$GITHUB_OUTPUT"
          echo "source_rpm_name=$(basename "${sourceRpm}")" >> "$GITHUB_OUTPUT"

      - name: Upload binary RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ steps.discover.outputs.binary_rpm_path }}
          if-no-files-found: error

      - name: Upload source RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}-source
          path: ${{ steps.discover.outputs.source_rpm_path }}
          if-no-files-found: error

      - name: Create tag
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.version.outputs.new_version }}',
              sha: context.sha
            })

      - name: Create GitHub Release
        id: create_release
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const tag = '${{ steps.version.outputs.new_version }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const mavenPackageUrl = `https://github.com/orgs/${owner}/packages?repo_name=${repo}&ecosystem=maven`;

            const resp = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: [
                `Automated release for ${tag}`,
                '',
                'Build artifacts:',
                `- RPM workflow artifacts: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
                `- Maven API package list: ${mavenPackageUrl}`,
                '',
                `RPM package version: ${tag}`
              ].join('\n'),
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            core.setOutput('release_id', String(resp.data.id));
            core.info(`Release created: ${resp.data.html_url}`);

      - name: Attach RPMs to release and update release notes
        if: inputs.attach_to_release
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ steps.create_release.outputs.release_id }}
          RELEASE_TAG: ${{ steps.version.outputs.new_version }}
          BINARY_RPM_PATH: ${{ steps.discover.outputs.binary_rpm_path }}
          SOURCE_RPM_PATH: ${{ steps.discover.outputs.source_rpm_path }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseId = Number.parseInt(process.env.RELEASE_ID || '', 10);
            const tag = process.env.RELEASE_TAG;
            const assetPaths = [process.env.BINARY_RPM_PATH, process.env.SOURCE_RPM_PATH].filter(Boolean);

            if (!Number.isFinite(releaseId) || releaseId <= 0) {
              core.setFailed(`Create GitHub Release did not provide a valid release id (received: ${process.env.RELEASE_ID || 'empty'}).`);
              return;
            }

            if (!tag) {
              core.setFailed('Release attachment requested, but RELEASE_TAG is empty.');
              return;
            }

            if (assetPaths.length === 0) {
              core.setFailed('No RPM assets discovered for release attachment.');
              return;
            }

            const existingAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: releaseId,
              per_page: 100
            });

            const uploadedAssetUrls = [];

            for (const assetPath of assetPaths) {
              const assetName = path.basename(assetPath);
              const existingAsset = existingAssets.find((asset) => asset.name === assetName);

              if (existingAsset) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existingAsset.id
                });
              }

              const data = fs.readFileSync(assetPath);
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: assetName,
                data,
                headers: {
                  'content-type': 'application/x-rpm',
                  'content-length': data.length
                }
              });

              uploadedAssetUrls.push({
                name: assetName,
                url: `https://github.com/${owner}/${repo}/releases/download/${tag}/${encodeURIComponent(assetName)}`
              });
            }

            const release = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId }).then((r) => r.data);
            let body = release.body || '';
            const additions = [];

            if (!body.includes('### RPM packages')) {
              additions.push('', '### RPM packages');
            }

            for (const asset of uploadedAssetUrls) {
              const line = `- [${asset.name}](${asset.url})`;
              if (!body.includes(line)) {
                additions.push(line);
              }
            }

            if (additions.length > 0) {
              body = `${body}${body.endsWith('\n') || body.length === 0 ? '' : '\n'}${additions.join('\n')}\n`;
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: releaseId,
                body
              });
            }

            core.info(`Attached ${uploadedAssetUrls.length} RPM assets to release ${tag}.`);

